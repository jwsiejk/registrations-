name: Validate Local ELT Lab Repository

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare root .env for validation
        run: cp .env.example .env

      - name: Run validation checks
        run: |
          bash tools/validate/run_all.sh
