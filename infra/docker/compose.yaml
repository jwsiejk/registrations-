services:
  postgres-crm:
    image: postgres:16
    container_name: postgres-crm
    restart: unless-stopped
    env_file:
      - ./compose/postgres-crm.env
    ports:
      - "${CRM_DB_PORT:-5433}:5432"
    volumes:
      - postgres_crm_data:/var/lib/postgresql/data
      - ./init/crm:/docker-entrypoint-initdb.d:ro
      - ../../db/crm:/opt/bootstrap/crm:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-erp:
    image: postgres:16
    container_name: postgres-erp
    restart: unless-stopped
    env_file:
      - ./compose/postgres-erp.env
    ports:
      - "${ERP_DB_PORT:-5434}:5432"
    volumes:
      - postgres_erp_data:/var/lib/postgresql/data
      - ./init/erp:/docker-entrypoint-initdb.d:ro
      - ../../db/erp:/opt/bootstrap/erp:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-warehouse:
    image: postgres:16
    container_name: postgres-warehouse
    restart: unless-stopped
    env_file:
      - ./compose/postgres-warehouse.env
    ports:
      - "${WAREHOUSE_DB_PORT:-5435}:5432"
    volumes:
      - postgres_warehouse_data:/var/lib/postgresql/data
      - ./init/warehouse:/docker-entrypoint-initdb.d:ro
      - ../../db/warehouse:/opt/bootstrap/warehouse:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_crm_data:
  postgres_erp_data:
  postgres_warehouse_data:
